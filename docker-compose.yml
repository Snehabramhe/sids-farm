services:
  # ---- MongoDB ----
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    # Uncomment to inspect the DB from the host:
    # ports:
    #   - "27017:27017"

  # ---- Backend API ----
  server:
    build: ./server
    restart: unless-stopped
    # Loads JWT_SECRET_KEY, STRIPE_SECRET_KEY, etc. from server/.env
    env_file:
      - ./server/.env
    # These override whatever is in server/.env so the API talks to the
    # mongo container and binds to all interfaces inside Docker.
    environment:
      MONGO_DB_URL: mongodb://mongo:27017
      MONGO_DATABASE: sids_farm
      HOSTNAME: 0.0.0.0
      PORT: 9000
    depends_on:
      - mongo

  # ---- Frontend (nginx) ----
  client:
    build:
      context: .
      args:
        # "" => app uses relative /api paths, which nginx proxies to server
        VITE_API_BASE_URL: ""
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY}
        VITE_PAYMENT_RETURN_URL: ${VITE_PAYMENT_RETURN_URL}
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  mongo-data:
